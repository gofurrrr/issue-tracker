<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisyui -->
   <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <!-- tailwiind css -->
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <!--font awesome  -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
   <!-- fonts -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- style link -->
    <link rel="stylesheet" href="./style/style.css">

</head>
<body>   
<div class="navbar bg-base-100 shadow-sm flex justify-between">
  <div class="flex  items-center pl-10">
    <img class="size-9" src="./assets/github-logo.png" alt="">
    <a class="btn btn-ghost text-xl font-bold ">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2 pr-10">
    
    <input type="text"  placeholder=" Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">

      <button class="btn btn-active btn-primary"> + New Issue</button>
    </div>
  </div>
</div>

    <section class="w-10/12  mx-auto  ">
        <div class="rounded-md shadow-md bg-white mt-13 p-3 flex justify-between items-center"> 
        <div class="space-x-2 ">
            <button id="allBtn" class="btn btn-active btn-primary px-8">All</button>
            <button id="openBtn" class="btn btn-active px-8">Open</button>
            <button id="closedBtn" class="btn btn-active px-8">Closed</button>
        </div>           
       </div>
        <div class="flex justify-between items-center "> 
                    <div class="flex  items-center mt-6 gap-2"> 
                    <img class="size-12 bg-violet-200 rounded-full p-2 mr-2 " src="./assets/Aperture.png" alt="">
                    <p> <span class="font-bold text-lg pt-4"> <span id="issueCount">0  </span> Issues</span> <br> <span class="text-gray-500">Track and manage your project issues </span></p>
                    </div>    
            

            </div>
            <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-6">
            </div>
      
    </section>





    <script src="./issue.js"></script>
</body>
</html>
